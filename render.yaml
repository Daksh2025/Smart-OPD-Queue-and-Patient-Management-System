services:
  # ── Backend (Flask API) ──────────────────────────────────────
  - type: web
    name: smart-opd-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: MONGO_URI
        sync: false        # Set this manually in Render dashboard
    healthCheckPath: /

  # ── Frontend (React Static Site) ────────────────────────────
  - type: web
    name: smart-opd-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        sync: false        # Set this to your backend URL in Render dashboard
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
